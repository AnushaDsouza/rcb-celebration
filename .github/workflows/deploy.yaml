name: RCB CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.anushadsouza }}
        password: ${{ secrets.dckr_pat_R-9BobFPzvFtze-M9TjUo-p7R9A }}

    - name: Build Docker Image
      run: |
        docker build -t anushadsouza/rcb-finals:latest .
        docker build -t anushadsouza/rcb-finals:${{ github.sha }} .

    - name: Push Docker Images
      run: |
        docker push anushadsouza/rcb-finals:latest
        docker push anushadsouza/rcb-finals:${{ github.sha }}
